name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - id: cache-key
        run: echo "value=$(sha256sum package-lock.json | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache/save@v5
        id: cache-node
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ steps.cache-key.outputs.value }}
    outputs:
      cache-key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ steps.cache-key.outputs.value }}

  typecheck:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache-node-restore
        with:
          path: node_modules
          key: ${{ runner.os }}-node-20-${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx tsc --noEmit
      - run: npx tsc --noEmit --project assets/web/client/tsconfig.json 2>/dev/null || true

  lint:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache-node-restore-lint
        with:
          path: node_modules
          key: ${{ runner.os }}-node-20-${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-lint.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint assets/extensions/subagents/src/ tests/ --max-warnings=200

  test:
    runs-on: ubuntu-latest
    needs: install-and-cache
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache-node-restore-test
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-test.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx vitest run --reporter verbose

  coverage:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache-node-restore-cov
        with:
          path: node_modules
          key: ${{ runner.os }}-node-22-${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-cov.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx vitest run --reporter verbose --coverage.enabled --coverage.reporter=lcov --coverage.reporter=text-summary

  validate:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache-node-restore-val
        with:
          path: node_modules
          key: ${{ runner.os }}-node-20-${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-val.outputs.cache-hit != 'true'
        run: npm ci
      - run: node scripts/ci/validate-agents.js
      - run: node scripts/ci/validate-skills.js

  audit:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache-node-restore-audit
        with:
          path: node_modules
          key: ${{ runner.os }}-node-20-${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-audit.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm audit --audit-level=high || echo "Audit warnings (suppressed for nested deps)"

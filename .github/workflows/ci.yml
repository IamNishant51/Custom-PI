name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - id: cache-key
        run: echo "value=${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache/save@v4
        id: cache-node
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.value }}
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}

  typecheck:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v4
        id: cache-node-restore
        with:
          path: node_modules
          key: ${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx tsc --noEmit
      - run: npx tsc --noEmit --project assets/web/client/tsconfig.json 2>/dev/null || true

  lint:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v4
        id: cache-node-restore-lint
        with:
          path: node_modules
          key: ${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-lint.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx tsc --noEmit
      - run: echo "Lint check passed"

  test:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v4
        id: cache-node-restore-test
        with:
          path: node_modules
          key: ${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-test.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx vitest run --reporter verbose

  validate:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v4
        id: cache-node-restore-val
        with:
          path: node_modules
          key: ${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-val.outputs.cache-hit != 'true'
        run: npm ci
      - run: node scripts/ci/validate-agents.js
      - run: node scripts/ci/validate-skills.js

  audit:
    runs-on: ubuntu-latest
    needs: install-and-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache/restore@v4
        id: cache-node-restore-audit
        with:
          path: node_modules
          key: ${{ needs.install-and-cache.outputs.cache-key }}
      - if: steps.cache-node-restore-audit.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm audit --audit-level=high

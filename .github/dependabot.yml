version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      fastify:
        patterns:
          - "@fastify/*"
          - "fastify"

  - package-ecosystem: "npm"
    directory: "/assets/web/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web-client"

  - package-ecosystem: "npm"
    directory: "/assets/extensions/subagents"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "subagents"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
      - "dependencies"

  - package-ecosystem: "pip"
    directory: "/tts_server"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "tts"

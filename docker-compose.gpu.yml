version: "3.9"
services:
  pi-custom-pack:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - pi_data:/app/data
      - pi_vault:/app/vault
    environment:
      - NODE_ENV=production
      - PORT=4321
      - TTS_SERVER=http://tts-server:8000
    depends_on:
      - tts-server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  tts-server:
    build: ./tts_server
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - LLM_URL=http://ollama:11434/v1/chat/completions
      - LLM_MODEL=llama3.2:3b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  pi_data:
  pi_vault:
  ollama_data:
  huggingface_cache:

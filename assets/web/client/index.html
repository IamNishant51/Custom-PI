<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Custom-PI: AI-powered development assistant web UI" />
    <title>Custom-PI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>✦</text></svg>" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        try {
          var t = JSON.parse(localStorage.getItem("custom-pi-theme") || '"dark"');
          if (t === "light") {
            document.documentElement.style.setProperty("--canvas", "#f5f5f7");
            document.documentElement.style.setProperty("--ink", "#1d1d1f");
            document.documentElement.style.setProperty("--body", "#424245");
            document.documentElement.style.setProperty("--surface-soft", "#ffffff");
            document.documentElement.classList.add("light");
          } else if (t === "terminal") {
            document.documentElement.style.setProperty("--canvas", "#0c0c0c");
            document.documentElement.style.setProperty("--ink", "#33ff33");
            document.documentElement.style.setProperty("--body", "#33cc33");
          } else if (t === "cyberpunk") {
            document.documentElement.style.setProperty("--canvas", "#0a0a1a");
            document.documentElement.style.setProperty("--ink", "#ff00ff");
            document.documentElement.style.setProperty("--body", "#c0a0e0");
          } else if (t === "midnight") {
            document.documentElement.style.setProperty("--canvas", "#0d1117");
            document.documentElement.style.setProperty("--ink", "#e6edf3");
            document.documentElement.style.setProperty("--body", "#8b949e");
          }
          document.querySelector('meta[name="theme-color"]')?.setAttribute("content",
            t === "light" ? "#f5f5f7" : t === "terminal" ? "#0c0c0c" : t === "cyberpunk" ? "#0a0a1a" : t === "midnight" ? "#0d1117" : "#0a0a0a"
          );
        } catch(e) {}
      })();
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function() {
          navigator.serviceWorker.register("/sw.js").catch(function(){});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
